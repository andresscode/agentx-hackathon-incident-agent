services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

  backend:
    build: ./backend
    env_file:
      - .env
    ports:
      - "8003:8000"
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/incident_agent
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:6006
      - APPRISE_URL=http://apprise:8000
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - EMAIL_SMTP_URL=${EMAIL_SMTP_URL:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - NOTIFY_EMAIL_ON_TRIAGE=${NOTIFY_EMAIL_ON_TRIAGE:-true}
      - NOTIFY_DISCORD_ON_TRIAGE=${NOTIFY_DISCORD_ON_TRIAGE:-true}
      - NOTIFY_CC_EMAILS=${NOTIFY_CC_EMAILS:-}
    depends_on:
      db:
        condition: service_healthy
      apprise:
        condition: service_started
      phoenix:
        condition: service_started

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
      - "4317:4317"

  apprise:
    image: caronc/apprise:v1.3.3
    ports:
      - "8001:8000"
    environment:
      - APPRISE_CONFIG_DIR=/config
    volumes:
      - apprise_config:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=incident_agent
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  peppermint-db:
    container_name: peppermint-db
    image: postgres:16-alpine
    restart: always
    volumes:
      - peppermint-pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: peppermint
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: peppermint
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peppermint"]
      interval: 5s
      timeout: 3s
      retries: 10

  peppermint:
    container_name: peppermint
    image: pepperlabs/peppermint:latest
    ports:
      - "3001:3000"
      - "5003:5003"
    restart: always
    depends_on:
      peppermint-db:
        condition: service_healthy
    environment:
      DB_USERNAME: "peppermint"
      DB_PASSWORD: "1234"
      DB_HOST: "peppermint-db"
      SECRET: "peppermint4life"

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - db

volumes:
  pgdata:
  peppermint-pgdata:
  apprise_config:
